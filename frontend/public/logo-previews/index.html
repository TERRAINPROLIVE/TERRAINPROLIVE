<!doctype html>
<html><head><meta charset="utf-8"><title>TerrainPRO Logo Preview</title>
<style>
  body{margin:0;font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#fafafa;padding:40px 20px}
  h1{font-size:14px;letter-spacing:.3em;text-transform:uppercase;color:#F5A623;margin:0 0 24px;text-align:center}
  .row{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin-bottom:32px}
  .card{background:#161616;border:1px solid #2a2a2a;border-left:2px solid #F5A623;padding:24px;border-radius:8px;min-width:280px;text-align:center}
  .card.light{background:#fff;color:#000;border-color:#ddd;border-left-color:#F5A623}
  .card .label{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:#888;margin-bottom:16px}
  .card.light .label{color:#555}
  .card img{display:block;margin:0 auto;height:140px;width:auto}
  .wordmark{margin-top:12px;font-weight:900;font-size:22px;letter-spacing:.04em}
  .wordmark .pro{color:#F5A623}
  .new{position:relative}
  .new::after{content:'NEW';position:absolute;top:-10px;right:-10px;background:#F5A623;color:#000;font-size:10px;font-weight:900;padding:4px 8px;letter-spacing:.15em;border-radius:3px}
  .sub{font-size:11px;color:#666;text-align:center;margin-top:8px;letter-spacing:.1em;text-transform:uppercase}
</style></head>
<body>
  <h1>TerrainPRO // Logo Preview</h1>

  <div class="sub">Current vs Proposed — White Lightning Bolt</div>
  <div class="row" style="margin-top:24px">
    <div class="card">
      <div class="label">Current (in app)</div>
      <img src="/logo-previews/terrainpro-logo-transparent.png" alt="current">
      <div class="wordmark">Terrain<span class="pro">PRO</span></div>
    </div>
    <div class="card new">
      <div class="label">Proposed — Solid White Bolt</div>
      <img src="/logo-previews/terrainpro-whitebolt-transparent.png" alt="new">
      <div class="wordmark">Terrain<span class="pro">PRO</span></div>
    </div>
  </div>

  <div class="sub">On a white background</div>
  <div class="row" style="margin-top:24px">
    <div class="card light">
      <div class="label">Current</div>
      <img src="/logo-previews/terrainpro-logo-white.png" alt="current-w">
      <div class="wordmark" style="color:#000">Terrain<span class="pro">PRO</span></div>
    </div>
    <div class="card light new">
      <div class="label">Proposed — White Bolt</div>
      <img src="/logo-previews/terrainpro-whitebolt-white.png" alt="new-w">
      <div class="wordmark" style="color:#000">Terrain<span class="pro">PRO</span></div>
    </div>
  </div>
</body></html>
